<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname +
      '/Routine-Tracker/' +
      '?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
